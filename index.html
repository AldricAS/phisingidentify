<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cek Link Phishing & Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #121212;
    color: #eee;
    margin: 2rem auto;
    max-width: 600px;
    padding: 0 1rem;
  }
  h2 { color: #3b82f6; text-align: center; }
  input {
    width: 100%;
    padding: 0.8rem;
    font-size: 1rem;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1e1e1e;
    color: white;
    margin-bottom: 1rem;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    background: #3b82f6;
    border: none;
    color: white;
    padding: 0.8rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  button:hover { background: #2563eb; }
  #log {
    white-space: pre-line;
    font-family: monospace;
    margin-top: 1.5rem;
    background: #1a1a1a;
    padding: 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    border-left: 4px solid #3b82f6;
  }
  #final {
    margin-top: 1.5rem;
    font-weight: 600;
    font-size: 1.1rem;
    text-align: center;
    padding: 1rem;
    border-radius: 8px;
  }
  .danger { background: #450a0a; color: #f87171; }
  .safe { background: #064e3b; color: #34d399; }
  
  #previewContainer {
    margin-top: 2rem;
    text-align: center;
  }
  #previewImage {
    max-width: 100%;
    border-radius: 8px;
    border: 2px solid #333;
    display: none;
  }
  .loading-text { font-style: italic; color: #888; margin-top: 10px; }
</style>
</head>
<body>

<h2>Cek Link Phishing By Aldric</h2>
<input id="urlInput" placeholder="Masukkan link (contoh: https://google.com)..." autocomplete="off" />
<button id="btnCheck" onclick="startCheck()">Analisis Link</button>

<div id="log" style="display:none;"></div>
<div id="final"></div>

<div id="previewContainer">
  <h3 id="previewTitle" style="display:none;">Pratinjau Situs:</h3>
  <div id="statusPreview"></div>
  <img id="previewImage" alt="Screenshot Preview" />
</div>

<script>
  async function checkUrl(url, apiKey) {
    const body = {
      client: { clientId: "aldric-checker", clientVersion: "1.0" },
      threatInfo: {
        threatTypes: ["MALWARE", "SOCIAL_ENGINEERING", "UNWANTED_SOFTWARE", "POTENTIALLY_HARMFUL_APPLICATION"],
        platformTypes: ["ANY_PLATFORM"],
        threatEntryTypes: ["URL"],
        threatEntries: [{ url }],
      }
    };

    try {
      const res = await fetch(`https://safebrowsing.googleapis.com/v4/threatMatches:find?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      return (data.matches && data.matches.length > 0);
    } catch (e) {
      return false;
    }
  }

  async function startCheck() {
    const googleApiKey = "AIzaSyDzH_VCfN_1AVQbYiT69pBUMnlwPXQL49Q"; 
    const flashApiKey = "ffcedd467933405e973fbb53d00b1bbb";
    let url = document.getElementById("urlInput").value.trim();
    
    if (!url) {
      alert("Masukkan link dulu ya!");
      return;
    }

    // Pastikan URL memiliki protokol
    if (!url.startsWith('http')) url = 'https://' + url;

    const logDiv = document.getElementById("log");
    const finalDiv = document.getElementById("final");
    const previewImg = document.getElementById("previewImage");
    const statusPreview = document.getElementById("statusPreview");
    const previewTitle = document.getElementById("previewTitle");

    // Reset Tampilan
    logDiv.style.display = "block";
    logDiv.textContent = "Memulai pemindaian...\n";
    finalDiv.textContent = "";
    finalDiv.className = "";
    previewImg.style.display = "none";
    previewTitle.style.display = "none";
    statusPreview.innerHTML = "";

    let virusCount = 0;
    const totalChecks = 3; // Dikurangi jadi 3 agar tidak terlalu lama menunggu timeout

    for (let i = 1; i <= totalChecks; i++) {
      logDiv.textContent += `Pengecekan ke-${i}: Sedang memeriksa... `;
      const isMalicious = await checkUrl(url, googleApiKey);
      
      if (isMalicious) {
        logDiv.textContent += "❌ BERBAHAYA\n";
        virusCount++;
      } else {
        logDiv.textContent += "✅ BERSIH\n";
      }
      
      if (i < totalChecks) await new Promise(r => setTimeout(r, 1000));
    }

    // Hasil Akhir
    if (virusCount > 0) {
      finalDiv.textContent = "‼️ PERINGATAN: Link ini terdeteksi Phishing/Virus!";
      finalDiv.className = "danger";
    } else {
      finalDiv.textContent = "✅ AMAN: Google Safe Browsing tidak menemukan ancaman.";
      finalDiv.className = "safe";
    }

    // Load Screenshot via API Flash
    previewTitle.style.display = "block";
    statusPreview.innerHTML = '<p class="loading-text">Sedang mengambil gambar situs... (Sabar ya)</p>';
    
    const screenshotUrl = `https://api.apiflash.com/v1/urltoimage?access_key=${flashApiKey}&wait_until=page_loaded&url=${encodeURIComponent(url)}`;
    
    previewImg.src = screenshotUrl;
    previewImg.onload = () => {
      statusPreview.innerHTML = "";
      previewImg.style.display = "inline-block";
    };
    previewImg.onerror = () => {
      statusPreview.innerHTML = '<p style="color: #f87171;">Gagal memuat gambar preview.</p>';
    };
  }
</script>

</body>
</html>
